<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Lozada Family</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <header class="navbar">

        <div class="logo">
            <i class="fa-solid fa-house-user"></i>
            Lozada Family
        </div>

        <nav>

            <ul>

                <li><a href="#"><i class="fa-solid fa-house"></i> Home</a></li>

                <li><a href="#"><i class="fa-solid fa-users"></i> Members</a></li>

                <li><a href="#"><i class="fa-solid fa-tree"></i> Family Tree</a></li>

                <li><a href="#"><i class="fa-solid fa-images"></i> Gallery</a></li>

                <li><a href="#"><i class="fa-solid fa-calendar-days"></i> Events</a></li>

                <li><a href="#"><i class="fa-solid fa-folder"></i> Documents</a></li>

                <li><a href="#"><i class="fa-solid fa-comments"></i> Chat</a></li>

            </ul>

        </nav>

        <div class="profile">

            <img src="images/profile.png" alt="Profile">

        </div>

    </header>

    <!-- ================= HERO ================= -->

    <section class="hero">

        <div class="overlay">

            <h1>Welcome to</h1>

            <h2>Lozada Family 💜</h2>

            <p>Where Love Begins and Memories Last Forever.</p>

            <div class="hero-buttons">

                <a href="#" class="btn-primary">

                    <i class="fa-solid fa-images"></i>

                    View Gallery

                </a>

                <a href="#" class="btn-secondary">

                    <i class="fa-solid fa-tree"></i>

                    Family Tree

                </a>

            </div>

        </div>

    </section>

</body>

</html>
